---
# install_pip/defaults/main.yml

# System package used to install pip itself.
# python3-pip -> derives pip_executable to pip3.
# python2-pip -> derives pip_executable to pip.
pip_package: python3-pip
venv_package: python3-venv

# Set to false to remove /usr/lib/python3.x/EXTERNALLY-MANAGED (PEP 668).
# Only needed for system-level (and sometimes user-level) pip installs outside a venv.
# Default is `false` due to issues even with the `--user` arg. Prefer a venv if possible.
# https://peps.python.org/pep-0668/
pip_externally_managed: false

# Fallback pip executable for non-venv installs. Derived from pip_package.
# Override per-item with item.executable for cases like pip2 on Kali,
# or pip3.13 when multiple interpreters are present.
pip_executable: "{{ 'pip3' if pip_package.startswith('python3') else 'pip' }}"

pip_install_packages: []
